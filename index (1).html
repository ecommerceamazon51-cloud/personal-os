/* ── HISTORY ENGINE ── */
function getHistory(){
  const keys=LS.keys();
  const wlogDates=keys.filter(k=>k.startsWith("wlog-")).map(k=>k.replace("wlog-","")).sort().reverse();
  const checkDates=keys.filter(k=>k.startsWith("checks-")).map(k=>k.replace("checks-","")).sort().reverse();
  const sessions=[];
  wlogDates.forEach(date=>{
    const log=LS.get(`wlog-${date}`);
    if(!log||Object.keys(log).length===0)return;
    const dIdx=dayIdx(date);
    const workout=WORKOUTS[dIdx];
    if(!workout)return;
    const exerciseData=[];
    let totalVolume=0,setsCompleted=0;
    workout.exercises.forEach((ex,eIdx)=>{
      const sets=[];
      for(let sIdx=0;sIdx<(ex.sets||3);sIdx++){
        const w=parseFloat(log[`${eIdx}-${sIdx}-w`])||0;
        const r=parseFloat(log[`${eIdx}-${sIdx}-r`])||0;
        const done=!!log[`${eIdx}-${sIdx}-done`];
        if(w>0||r>0||done){sets.push({set:sIdx+1,weight:w,reps:r,done,volume:w*r});totalVolume+=w*r;if(done)setsCompleted++;}
      }
      if(sets.length>0){
        const best=sets.reduce((a,b)=>a.weight>b.weight?a:b,sets[0]);
        exerciseData.push({name:ex.name,sets,bestWeight:best.weight,bestReps:best.reps});
      }
    });
    if(exerciseData.length>0)sessions.push({date,dayName:DAYNAMES[dIdx],workoutName:workout.name,exercises:exerciseData,totalVolume,setsCompleted});
  });
  const prs={};
  sessions.forEach(sess=>{
    sess.exercises.forEach(ex=>{
      if(!prs[ex.name]||ex.bestWeight>prs[ex.name].weight)prs[ex.name]={weight:ex.bestWeight,reps:ex.bestReps,date:sess.date};
    });
  });
  const checkHistory=[];
  let currentStreak=0,longestStreak=0,tempStreak=0;
  const sorted=[...checkDates].sort();
  sorted.forEach(date=>{
    const checks=LS.get(`checks-${date}`);
    if(!checks)return;
    const completed=Object.values(checks).filter(Boolean).length;
    const pct=Math.round((completed/CHECKLIST.length)*100);
    checkHistory.push({date,completed,total:CHECKLIST.length,pct});
    if(pct>=75){tempStreak++;if(tempStreak>longestStreak)longestStreak=tempStreak;}else tempStreak=0;
  });
  currentStreak=tempStreak;
  const weeklyVolume=[];
  const now=new Date();
  for(let w=0;w<8;w++){
    const wEnd=new Date(now);wEnd.setDate(now.getDate()-w*7);
    const wStart=new Date(wEnd);wStart.setDate(wEnd.getDate()-6);
    const ws=wStart.toISOString().split("T")[0],we=wEnd.toISOString().split("T")[0];
    let vol=0,days=0;
    sessions.forEach(s=>{if(s.date>=ws&&s.date<=we){vol+=s.totalVolume;days++;}});
    weeklyVolume.push({weekLabel:`W-${w}`,volume:vol,days});
  }
  weeklyVolume.reverse();
  return{sessions,prs,checkHistory:checkHistory.reverse(),currentStreak,longestStreak,weeklyVolume};
}

      </div>
      <div>
        <div style={{fontSize:12,fontWeight:600,color:checks[item.id]?C.grey:C.white,textDecoration:checks[item.id]?"line-through":"none"}}>{item.t}</div>
        <div style={{fontSize:11,color:C.dim,marginTop:2}}>{item.d}</div>
      </div>
    </div>))}
  </div>);

  /* WORKOUT */
  const WorkoutView=()=>(<div className="fade-in">
    <div style={s.header}>
      <div style={s.title}>{DAYNAMES[d]}</div>
      <div style={s.h1}>{workout.name}</div>
      <div style={{fontSize:11,color:C.grey,marginTop:4}}>{workout.focus}</div>
      {isDeload&&<div style={{fontSize:11,color:C.orange,marginTop:4}}>⚠️ DELOAD: -40% weight, -1 set</div>}
    </div>
    {workout.exercises.map((ex,eIdx)=>{
      const setCount=isDeload?Math.max(1,(ex.sets||3)-1):(ex.sets||3);
      const pr=history&&history.prs[ex.name];
      return(<div key={eIdx} style={{...s.card}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:C.white}}>{ex.name}</div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>{ex.sets}x{ex.reps} — {ex.note}</div>
          </div>
          {pr&&pr.weight>0&&(<div style={{background:`${C.accent}15`,border:`1px solid ${C.accent}33`,borderRadius:6,padding:"4px 8px",textAlign:"center",flexShrink:0,marginLeft:8}}>
            <div style={{fontSize:11,fontWeight:700,color:C.accent}}>PR {pr.weight}lb</div>
            <div style={{fontSize:9,color:C.dim}}>x{pr.reps}</div>
          </div>)}
        </div>
        {Array.from({length:setCount}).map((_,sIdx)=>(<div key={sIdx} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:10,color:C.dim,width:24}}>S{sIdx+1}</div>
          <input type="number" placeholder="lbs" value={getWval(eIdx,sIdx,"w")} onChange={e=>setWval(eIdx,sIdx,"w",e.target.value)} style={{...s.input,width:64,textAlign:"center"}}/>
          <input type="number" placeholder="reps" value={getWval(eIdx,sIdx,"r")} onChange={e=>setWval(eIdx,sIdx,"r",e.target.value)} style={{...s.input,width:56,textAlign:"center"}}/>
          <div onClick={()=>toggleWdone(eIdx,sIdx)} style={{width:24,height:24,borderRadius:4,border:`2px solid ${isWdone(eIdx,sIdx)?C.green:C.dark}`,background:isWdone(eIdx,sIdx)?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
            {isWdone(eIdx,sIdx)&&<span style={{color:C.bg,fontSize:11,fontWeight:700}}>✓</span>}
          </div>
        </div>))}
      </div>);
    })}
  </div>);

  /* HISTORY */
  const HistoryView=()=>{
    if(!history)return null;
    const{sessions,prs,checkHistory,currentStreak,longestStreak,weeklyVolume}=history;
    const prList=Object.entries(prs).filter(([_,v])=>v.weight>0).sort((a,b)=>b[1].weight-a[1].weight);
    return(<div className="fade-in">
      <div style={s.header}>
        <div style={s.title}>History</div>
        <div style={s.h1}>Progress Tracker</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[{id:"workouts",l:"Workouts"},{id:"prs",l:"PRs"},{id:"streaks",l:"Streaks"},{id:"volume",l:"Volume"}].map(t=>(
          <div key={t.id} onClick={()=>setHistoryTab(t.id)} style={s.pill(historyTab===t.id)}>{t.l}</div>
        ))}
      </div>

      {historyTab==="workouts"&&(<div>
        {sessions.length===0?(<div style={{...s.card,textAlign:"center",color:C.dim,padding:32}}>
          <div style={{fontSize:24,marginBottom:8}}>🏋️</div>
          <div style={{fontSize:13}}>No workout data yet</div>
          <div style={{fontSize:11,marginTop:4}}>Log your first workout and it'll show here</div>
        </div>):(sessions.slice(0,20).map((sess,i)=>{const isOpen=expandedSession===i;return(
          <div key={i} style={{...s.card,borderLeft:`3px solid ${C.blue}`}}>
            <div onClick={()=>setExpandedSession(isOpen?null:i)} style={{cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.white}}>{fmtDate(sess.date)}</div>
                <div style={{fontSize:11,color:C.dim,marginTop:2}}>{sess.workoutName}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,fontWeight:600,color:C.accent}}>{sess.totalVolume>=1000?(sess.totalVolume/1000).toFixed(1)+"k":sess.totalVolume} lbs</div>
                <div style={{fontSize:10,color:C.dim}}>{sess.setsCompleted} sets</div>
              </div>
            </div>
            {isOpen&&(<div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
              {sess.exercises.map((ex,j)=>(<div key={j} style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:600,color:C.white,marginBottom:4}}>{ex.name}</div>
                {ex.sets.map((st,k)=>(<div key={k} style={{display:"flex",gap:12,fontSize:11,color:C.grey,paddingLeft:8}}>
                  <span style={{color:C.dim,width:20}}>S{st.set}</span>
                  <span>{st.weight}lb</span><span>x{st.reps}</span>
                  <span style={{color:C.dim}}>= {st.volume}lb</span>
                </div>))}
              </div>))}
            </div>)}
          </div>);}))}
      </div>)}

      {historyTab==="prs"&&(<div>
        {prList.length===0?(<div style={{...s.card,textAlign:"center",color:C.dim,padding:32}}>
          <div style={{fontSize:24,marginBottom:8}}>🏆</div>
          <div style={{fontSize:13}}>No PRs yet</div>
          <div style={{fontSize:11,marginTop:4}}>Your heaviest set per exercise appears here</div>
        </div>):(prList.map(([name,pr],i)=>(<div key={i} style={{...s.card,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`3px solid ${C.accent}`}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:C.white}}>{name}</div>
            <div style={{fontSize:10,color:C.dim,marginTop:2}}>{fmtDate(pr.date)}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:700,color:C.accent}}>{pr.weight}<span style={{fontSize:11,color:C.dim}}>lb</span></div>
            <div style={{fontSize:10,color:C.dim}}>x{pr.reps}</div>
          </div>
        </div>)))}
      </div>)}

      {historyTab==="streaks"&&(<div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <div style={s.statBox}><div style={{fontSize:22,fontWeight:700,color:C.green}}>{currentStreak}</div><div style={{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}}>CURRENT</div></div>
          <div style={s.statBox}><div style={{fontSize:22,fontWeight:700,color:C.accent}}>{longestStreak}</div><div style={{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}}>LONGEST</div></div>
          <div style={s.statBox}><div style={{fontSize:22,fontWeight:700,color:C.blue}}>{checkHistory.length}</div><div style={{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}}>DAYS</div></div>
        </div>
        <div style={{fontSize:10,color:C.dim,letterSpacing:1,marginBottom:8}}>STREAK = 75%+ TASKS COMPLETED</div>
        {checkHistory.length===0?(<div style={{...s.card,textAlign:"center",color:C.dim,padding:32}}>
          <div style={{fontSize:24,marginBottom:8}}>📋</div><div style={{fontSize:13}}>No checklist data yet</div>
        </div>):(checkHistory.slice(0,14).map((ch,i)=>(<div key={i} style={{...s.card,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`3px solid ${ch.pct>=75?C.green:ch.pct>=50?C.yellow:C.red}`}}>
          <div><div style={{fontSize:12,fontWeight:600,color:C.white}}>{fmtDate(ch.date)}</div><div style={{fontSize:11,color:C.dim,marginTop:2}}>{ch.completed}/{ch.total} tasks</div></div>
          <div style={{fontSize:18,fontWeight:700,color:ch.pct>=75?C.green:ch.pct>=50?C.yellow:C.red}}>{ch.pct}%</div>
        </div>)))}
      </div>)}

      {historyTab==="volume"&&(<div>
        <div style={{...s.card}}>
          <div style={{fontSize:11,fontWeight:600,color:C.white,marginBottom:12,letterSpacing:1}}>WEEKLY TOTAL VOLUME (lbs)</div>
          {weeklyVolume.some(w=>w.volume>0)?<BarChart data={weeklyVolume} labelKey="weekLabel" valueKey="volume" color={C.blue}/>
          :<div style={{textAlign:"center",color:C.dim,padding:24,fontSize:12}}>Log workouts to see volume trend</div>}
        </div>
        <div style={{...s.card}}>
          <div style={{fontSize:11,fontWeight:600,color:C.white,marginBottom:12,letterSpacing:1}}>TRAINING DAYS PER WEEK</div>
          {weeklyVolume.some(w=>w.days>0)?<BarChart data={weeklyVolume} labelKey="weekLabel" valueKey="days" color={C.green} height={80}/>
          :<div style={{textAlign:"center",color:C.dim,padding:24,fontSize:12}}>Log workouts to see consistency</div>}
        </div>
      </div>)}
    </div>);
  };

  /* SYSTEMS */
  const Systems=()=>(<div className="fade-in">
    <div style={s.header}><div style={s.title}>Reference</div><div style={s.h1}>All Systems</div></div>
    {section===null?(Object.entries(SECTIONS).map(([key,sec])=>(
      <div key={key} onClick={()=>setSection(key)} style={{...s.card,cursor:"pointer",display:"flex",alignItems:"center",gap:12,borderLeft:`3px solid ${sec.color}`}}>
        <div style={{fontSize:20}}>{sec.icon}</div>
        <div><div style={{fontSize:13,fontWeight:600,color:C.white}}>{sec.label}</div><div style={{fontSize:11,color:C.dim}}>{sec.subs.length} topics</div></div>
        <div style={{marginLeft:"auto",color:C.dim,fontSize:14}}>→</div>
      </div>
    ))):(<div>
      <div onClick={()=>setSection(null)} style={{fontSize:12,color:C.accent,cursor:"pointer",marginBottom:12}}>← Back</div>
      <div style={{fontSize:18,fontWeight:700,color:SECTIONS[section].color,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        <span>{SECTIONS[section].icon}</span>{SECTIONS[section].label}
      </div>
      {SECTIONS[section].subs.map((sub,i)=>{const key=`${section}-${i}`;const open=openSubs[key];return(
        <div key={i} style={{...s.card}}>
          <div onClick={()=>toggleSub(key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
            <div style={{fontSize:12,fontWeight:600,color:C.white,letterSpacing:1}}>{sub.t}</div>
            <div style={{color:C.dim,fontSize:12,transform:open?"rotate(90deg)":"rotate(0)",transition:"transform .15s"}}>▶</div>
          </div>
          {open&&(<div style={{marginTop:10}}>
            {sub.i.map((item,j)=>(<div key={j} style={{fontSize:12,color:C.grey,lineHeight:1.6,padding:"5px 0 5px 10px",borderLeft:`2px solid ${SECTIONS[section].color}33`,marginBottom:2}}>{item}</div>))}
          </div>)}
        </div>);})}
    </div>)}
  </div>);

  return(<div style={{background:C.bg,minHeight:"100vh"}}>
    <div style={s.wrap}>
      {view==="dashboard"&&<Dashboard/>}
      {view==="workout"&&<WorkoutView/>}
      {view==="history"&&<HistoryView/>}
      {view==="sections"&&<Systems/>}
    </div>
    <div style={s.nav}>
      {[{id:"dashboard",icon:"📋",l:"Today"},{id:"workout",icon:"🏋️",l:"Workout"},{id:"history",icon:"📊",l:"History"},{id:"sections",icon:"◆",l:"Systems"}].map(tab=>(
        <div key={tab.id} onClick={()=>{setView(tab.id);if(tab.id!=="sections")setSection(null);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"4px 12px",border:"none",background:"none"}}>
          <span style={{fontSize:18}}>{tab.icon}</span>
          <span style={{fontSize:9,letterSpacing:1,color:view===tab.id?C.accent:C.dim,fontWeight:view===tab.id?700:400}}>{tab.l}</span>
        </div>
      ))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
