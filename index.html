function getHistory(){
  var keys=LS.keys();
  var wlogEntries=[];
  keys.forEach(function(k){
    if(k.match(/^wlog-\d+-\d{4}-/)){
      var parts=k.replace("wlog-","");var di=parts.indexOf("-");
      wlogEntries.push({date:parts.slice(di+1),dayOverride:parseInt(parts.slice(0,di)),key:k});
    }else if(k.match(/^wlog-\d{4}-/)){
      wlogEntries.push({date:k.replace("wlog-",""),dayOverride:null,key:k});
    }
  });
  wlogEntries.sort(function(a,b){return b.date.localeCompare(a.date)});
  var checkDates=keys.filter(function(k){return k.indexOf("checks-")===0}).map(function(k){return k.replace("checks-","")}).sort().reverse();
  var sessions=[];
  wlogEntries.forEach(function(entry){
    var date=entry.date;var log=LS.get(entry.key);
    if(!log||Object.keys(log).length===0)return;
    var dIdx=entry.dayOverride!==null?entry.dayOverride:getDayIdx(date);
    var workout=WORKOUTS[dIdx];if(!workout)return;
    var exerciseData=[];var totalVolume=0;var setsCompleted=0;
    workout.exercises.forEach(function(ex,eIdx){
      var sets=[];
      for(var sIdx=0;sIdx<(ex.sets||3);sIdx++){
        var w=parseFloat(log[eIdx+"-"+sIdx+"-w"])||0;
        var r=parseFloat(log[eIdx+"-"+sIdx+"-r"])||0;
        var done=!!log[eIdx+"-"+sIdx+"-done"];
        if(w>0||r>0||done){sets.push({set:sIdx+1,weight:w,reps:r,done:done,volume:w*r});totalVolume+=w*r;if(done)setsCompleted++;}
      }
      if(sets.length>0){
        var best=sets.reduce(function(a,b){return a.weight>b.weight?a:b},sets[0]);
        exerciseData.push({name:ex.name,sets:sets,bestWeight:best.weight,bestReps:best.reps});
      }
    });
    if(exerciseData.length>0)sessions.push({date:date,dayName:DAYNAMES[dIdx],dayIdx:dIdx,workoutName:workout.name,exercises:exerciseData,totalVolume:totalVolume,setsCompleted:setsCompleted});
  });
  var prs={};
  sessions.forEach(function(sess){
    sess.exercises.forEach(function(ex){
      if(!prs[ex.name]||ex.bestWeight>prs[ex.name].weight)prs[ex.name]={weight:ex.bestWeight,reps:ex.bestReps,date:sess.date};
    });
  });
  var checkHistory=[];var currentStreak=0;var longestStreak=0;var tempStreak=0;
  checkDates.slice().sort().forEach(function(date){
    var checks=LS.get("checks-"+date);if(!checks)return;
    var completed=Object.values(checks).filter(Boolean).length;
    var pct=Math.round((completed/CHECKLIST.length)*100);
    checkHistory.push({date:date,completed:completed,total:CHECKLIST.length,pct:pct});
    if(pct>=75){tempStreak++;if(tempStreak>longestStreak)longestStreak=tempStreak;}else tempStreak=0;
  });
  currentStreak=tempStreak;
  var weeklyVolume=[];var now=new Date();
  for(var wi=0;wi<8;wi++){
    var wEnd=new Date(now);wEnd.setDate(now.getDate()-wi*7);
    var wStart=new Date(wEnd);wStart.setDate(wEnd.getDate()-6);
    var ws=wStart.toISOString().split("T")[0];var we=wEnd.toISOString().split("T")[0];
    var vol=0;var days=0;
    sessions.forEach(function(s){if(s.date>=ws&&s.date<=we){vol+=s.totalVolume;days++;}});
    weeklyVolume.push({weekLabel:"W-"+wi,volume:vol,days:days});
  }
  weeklyVolume.reverse();

  // Weekly muscle set counts (current Mon–Sun)
  var todayObj=new Date(getToday()+"T12:00:00");
  var dow=todayObj.getDay();
  var diffToMon=(dow===0?-6:1-dow);
  var weekMon=new Date(todayObj);weekMon.setDate(todayObj.getDate()+diffToMon);
  var weekMonStr=weekMon.toISOString().split("T")[0];
  var weeklyMuscles={};
  Object.keys(MUSCLE_TARGETS).forEach(function(m){weeklyMuscles[m]=0;});
  wlogEntries.forEach(function(entry){
    if(entry.date<weekMonStr)return;
    var log=LS.get(entry.key);if(!log)return;
    var dIdx=entry.dayOverride!==null?entry.dayOverride:getDayIdx(entry.date);
    var wo=WORKOUTS[dIdx];if(!wo)return;
    wo.exercises.forEach(function(ex,eIdx){
      if(!ex.muscles||ex.muscles.length===0)return;
      for(var sIdx=0;sIdx<(ex.sets||3);sIdx++){
        if(log[eIdx+"-"+sIdx+"-done"]){
          ex.muscles.forEach(function(m){if(weeklyMuscles.hasOwnProperty(m))weeklyMuscles[m]++;});
        }
      }
    });
  });

  return{sessions:sessions,prs:prs,checkHistory:checkHistory.reverse(),currentStreak:currentStreak,longestStreak:longestStreak,weeklyVolume:weeklyVolume,weeklyMuscles:weeklyMuscles};
}

function getGhostData(todayDate){
  var keys=LS.keys();var todayDayIdx=getDayIdx(todayDate);var workout=WORKOUTS[todayDayIdx];
  if(!workout)return null;
  var wlogEntries=[];
  keys.forEach(function(k){
    if(k.match(/^wlog-\d+-\d{4}-/)){var parts=k.replace("wlog-","");var di=parts.indexOf("-");wlogEntries.push({date:parts.slice(di+1),dayOverride:parseInt(parts.slice(0,di)),key:k});}
    else if(k.match(/^wlog-\d{4}-/)){wlogEntries.push({date:k.replace("wlog-",""),dayOverride:null,key:k});}
  });
  wlogEntries.sort(function(a,b){return b.date.localeCompare(a.date)});
  for(var i=0;i<wlogEntries.length;i++){
    var entry=wlogEntries[i];if(entry.date===todayDate)continue;
    var entryDay=entry.dayOverride!==null?entry.dayOverride:getDayIdx(entry.date);
    if(entryDay!==todayDayIdx)continue;
    var log=LS.get(entry.key);if(!log||Object.keys(log).length===0)continue;
    var ghost={date:entry.date,exercises:{}};
    workout.exercises.forEach(function(ex,eIdx){
      var sets=[];
      for(var sIdx=0;sIdx<(ex.sets||3);sIdx++){var w=parseFloat(log[eIdx+"-"+sIdx+"-w"])||0;var r=parseFloat(log[eIdx+"-"+sIdx+"-r"])||0;if(w>0||r>0)sets.push({weight:w,reps:r});}

        })
      ):null,
      historyTab==="streaks"?h("div",null,
        h("div",{style:{display:"flex",gap:10,marginBottom:16}},
          h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px",flex:1,textAlign:"center"}},h("div",{style:{fontSize:22,fontWeight:700,color:C.green}},currentStreak),h("div",{style:{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}},"CURRENT")),
          h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px",flex:1,textAlign:"center"}},h("div",{style:{fontSize:22,fontWeight:700,color:C.accent}},longestStreak),h("div",{style:{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}},"LONGEST")),
          h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px",flex:1,textAlign:"center"}},h("div",{style:{fontSize:22,fontWeight:700,color:C.blue}},checkHistory.length),h("div",{style:{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}},"DAYS"))
        ),
        h("div",{style:{fontSize:10,color:C.dim,letterSpacing:1,marginBottom:8}},"STREAK = 75%+ TASKS COMPLETED"),
        checkHistory.length===0?h("div",{style:Object.assign({},S.card,{textAlign:"center",color:C.dim,padding:32})},h("div",{style:{fontSize:24,marginBottom:8}},"📋"),h("div",{style:{fontSize:13}},"No checklist data yet"))
        :checkHistory.slice(0,14).map(function(ch,i){
          var clr=ch.pct>=75?C.green:ch.pct>=50?C.yellow:C.red;
          return h("div",{key:i,style:Object.assign({},S.card,{display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+clr})},
            h("div",null,h("div",{style:{fontSize:12,fontWeight:600,color:C.white}},fmtDate(ch.date)),h("div",{style:{fontSize:11,color:C.dim,marginTop:2}},ch.completed+"/"+ch.total+" tasks")),
            h("div",{style:{fontSize:18,fontWeight:700,color:clr}},ch.pct+"%")

        })
      ):null,
      historyTab==="volume"?h("div",null,
        h("div",{style:S.card},h("div",{style:{fontSize:11,fontWeight:600,color:C.white,marginBottom:12,letterSpacing:1}},"WEEKLY TOTAL VOLUME (lbs)"),weeklyVolume.some(function(w){return w.volume>0})?h(BarChart,{data:weeklyVolume,labelKey:"weekLabel",valueKey:"volume",color:C.blue}):h("div",{style:{textAlign:"center",color:C.dim,padding:24,fontSize:12}},"Log workouts to see volume trend")),
        h("div",{style:S.card},h("div",{style:{fontSize:11,fontWeight:600,color:C.white,marginBottom:12,letterSpacing:1}},"TRAINING DAYS PER WEEK"),weeklyVolume.some(function(w){return w.days>0})?h(BarChart,{data:weeklyVolume,labelKey:"weekLabel",valueKey:"days",color:C.green,height:80}):h("div",{style:{textAlign:"center",color:C.dim,padding:24,fontSize:12}},"Log workouts to see consistency"))
      ):null,
      historyTab==="muscles"?h("div",null,
        h("div",{style:{fontSize:10,color:C.dim,letterSpacing:1,marginBottom:4}},"SETS THIS WEEK (MON–SUN)"),
        h("div",{style:{fontSize:9,color:C.dim,marginBottom:14}},"Based on minimum effective volume research (RP Strength)"),
        Object.entries(MUSCLE_TARGETS).map(function(entry,i){

          var pct=Math.min(100,(sets/tgt.target)*100);
          var clr=sets<tgt.min?C.red:sets>=tgt.target?C.green:C.yellow;
          return h("div",{key:i,style:Object.assign({},S.card,{padding:"10px 14px"})},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
              h("div",{style:{fontSize:12,fontWeight:600,color:C.white}},muscle),
              h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                h("div",{style:{fontSize:9,color:clr===C.red?"#ef4444":clr===C.green?"#22c55e":"#fbbf24",fontWeight:600,letterSpacing:1}},sets<tgt.min?"BELOW MIN":sets>=tgt.target?"✓ ON TARGET":"BUILDING"),

            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:9,color:C.dim}},
              h("div",null,"min: "+tgt.min),h("div",null,"goal: "+tgt.target)

  }

  function SystemsView(){
    return h("div",null,
      h("div",{style:S.header},h("div",{style:S.title},"Reference"),h("div",{style:S.h1},"All Systems")),
      section===null?Object.entries(SECTIONS).map(function(entry){
        var key=entry[0];var sec=entry[1];
        return h("div",{key:key,onClick:function(){setSection(key)},style:Object.assign({},S.card,{cursor:"pointer",display:"flex",alignItems:"center",gap:12,borderLeft:"3px solid "+sec.color})},
          h("div",{style:{fontSize:20}},sec.icon),
          h("div",null,h("div",{style:{fontSize:13,fontWeight:600,color:C.white}},sec.label),h("div",{style:{fontSize:11,color:C.dim}},sec.subs.length+" topics")),
          h("div",{style:{marginLeft:"auto",color:C.dim,fontSize:14}},"→")
        );
      }):h("div",null,
        h("div",{onClick:function(){setSection(null)},style:{fontSize:12,color:C.accent,cursor:"pointer",marginBottom:12}},"← Back"),
        h("div",{style:{fontSize:18,fontWeight:700,color:SECTIONS[section].color,marginBottom:16,display:"flex",alignItems:"center",gap:8}},h("span",null,SECTIONS[section].icon),SECTIONS[section].label),
        SECTIONS[section].subs.map(function(sub,i){

            h("div",{onClick:function(){toggleSub(key)},style:{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}},
              h("div",{style:{fontSize:12,fontWeight:600,color:C.white,letterSpacing:1}},sub.t),
              h("div",{style:{color:C.dim,fontSize:12,transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .15s"}},"▶")
            ),
            open?h("div",{style:{marginTop:10}},
              sub.i.map(function(item,j){return h("div",{key:j,style:{fontSize:12,color:C.grey,lineHeight:1.6,padding:"5px 0 5px 10px",borderLeft:"2px solid "+SECTIONS[section].color+"33",marginBottom:2}},item);})
            ):null
          );
        })
      )
    );
  }

  var tabs=[{id:"dashboard",icon:"📋",l:"Today"},{id:"workout",icon:"🏋️",l:"Workout"},{id:"history",icon:"📊",l:"History"},{id:"sections",icon:"◆",l:"Systems"}];

  return h("div",{style:{background:C.bg,minHeight:"100vh"},onTouchStart:handleTouchStart,onTouchEnd:handleTouchEnd},
    h("div",{style:S.wrap},
      h("div",{key:"v-"+view,className:"fade-in"},
        view==="dashboard"?Dashboard():
        view==="workout"?WorkoutView():
        view==="history"?HistoryView():
        view==="sections"?SystemsView():null
      )
    ),
    timer?h("div",{style:{position:"fixed",bottom:56,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card,borderTop:"2px solid "+timerClr,padding:"10px 14px",zIndex:99,display:"flex",alignItems:"center",gap:10}},
      h("div",{style:{flex:1}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}},
          h("div",{style:{fontSize:9,color:C.dim,letterSpacing:1,textTransform:"uppercase",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160}},timer.label||"REST"),
          h("div",{style:{fontSize:20,fontWeight:700,color:timerClr,fontVariantNumeric:"tabular-nums",letterSpacing:2}},timer.done?"DONE ✓":fmtTimer(timer.remaining))
        ),
        h("div",{style:{height:3,background:C.dark,borderRadius:2}},
          h("div",{style:{height:3,background:timerClr,borderRadius:2,width:(timer.done?100:Math.round((timer.remaining/timer.total)*100))+"%",transition:"width 1s linear"}})
        )
      ),
      h("div",{style:{display:"flex",gap:5,flexShrink:0}},
        !timer.done&&h("div",{onClick:function(){setTimer(function(t){return t?{remaining:Math.max(10,t.remaining-30),total:t.total,label:t.label,active:t.active,done:t.done}:t})},style:{fontSize:10,color:C.dim,padding:"5px 7px",border:"1px solid "+C.border,borderRadius:4,cursor:"pointer"}},"−30"),
        !timer.done&&h("div",{onClick:function(){setTimer(function(t){return t?{remaining:t.remaining+30,total:t.total,label:t.label,active:t.active,done:t.done}:t})},style:{fontSize:10,color:C.dim,padding:"5px 7px",border:"1px solid "+C.border,borderRadius:4,cursor:"pointer"}},"+30"),
        h("div",{onClick:function(){setTimer(null)},style:{fontSize:10,color:C.bg,padding:"5px 9px",background:timer.done?C.accent:C.dark,borderRadius:4,cursor:"pointer",fontWeight:700}},timer.done?"CLOSE":"SKIP")
      )

    h("div",{style:S.nav},

          h("span",{style:{fontSize:18}},tab.icon),
          h("span",{style:{fontSize:9,letterSpacing:1,color:view===tab.id?C.accent:C.dim,fontWeight:view===tab.id?700:400}},tab.l)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
