function buildHistoryFromRows(wrows,crows){
  var byDate={};
  wrows.forEach(function(row){
    if(!byDate[row.date])byDate[row.date]=[];
    byDate[row.date].push(row);
  });
  var sessions=[];
  Object.keys(byDate).sort().reverse().forEach(function(date){
    var rows=byDate[date];
    var dayOverride=rows[0].day_override;
    var dIdx=(dayOverride!==null&&dayOverride!==undefined)?dayOverride:getDayIdx(date);
    var workout=WORKOUTS[dIdx];if(!workout)return;
    var log={};
    rows.forEach(function(row){
      var ei=row.exercise_idx;var si=row.set_idx;
      if(row.weight!==null&&row.weight!==undefined)log[ei+"-"+si+"-w"]=row.weight;
      if(row.reps!==null&&row.reps!==undefined)log[ei+"-"+si+"-r"]=row.reps;
      if(row.is_done)log[ei+"-"+si+"-done"]=true;
    });
    var exerciseData=[];var totalVolume=0;var setsCompleted=0;
    workout.exercises.forEach(function(ex,eIdx){
      var sets=[];
      for(var sIdx=0;sIdx<(ex.sets||3);sIdx++){
        var w=parseFloat(log[eIdx+"-"+sIdx+"-w"])||0;
        var r=parseFloat(log[eIdx+"-"+sIdx+"-r"])||0;
        var done=!!log[eIdx+"-"+sIdx+"-done"];
        if(w>0||r>0||done){sets.push({set:sIdx+1,weight:w,reps:r,done:done,volume:w*r});totalVolume+=w*r;if(done)setsCompleted++;}
      }
      if(sets.length>0){var best=sets.reduce(function(a,b){return a.weight>b.weight?a:b},sets[0]);exerciseData.push({name:ex.name,sets:sets,bestWeight:best.weight,bestReps:best.reps});}
    });
    if(exerciseData.length>0)sessions.push({date:date,dayName:DAYNAMES[dIdx],dayIdx:dIdx,workoutName:workout.name,exercises:exerciseData,totalVolume:totalVolume,setsCompleted:setsCompleted});
  });
  var prs={};
  sessions.forEach(function(sess){
    sess.exercises.forEach(function(ex){
      if(!prs[ex.name]||ex.bestWeight>prs[ex.name].weight)prs[ex.name]={weight:ex.bestWeight,reps:ex.bestReps,date:sess.date};
    });
  });
  var byCheckDate={};
  crows.forEach(function(row){if(!byCheckDate[row.date])byCheckDate[row.date]=[];byCheckDate[row.date].push(row);});
  var checkHistory=[];var currentStreak=0;var longestStreak=0;var tempStreak=0;
  Object.keys(byCheckDate).sort().forEach(function(date){
    var rows=byCheckDate[date];
    var completed=rows.filter(function(r){return r.is_done;}).length;
    var pct=Math.round((completed/CHECKLIST.length)*100);
    checkHistory.push({date:date,completed:completed,total:CHECKLIST.length,pct:pct});
    if(pct>=75){tempStreak++;if(tempStreak>longestStreak)longestStreak=tempStreak;}else tempStreak=0;
  });
  currentStreak=tempStreak;
  var weeklyVolume=[];var now=new Date();
  for(var wi=0;wi<8;wi++){
    var wEnd=new Date(now);wEnd.setDate(now.getDate()-wi*7);
    var wStart=new Date(wEnd);wStart.setDate(wEnd.getDate()-6);
    var ws=wStart.toISOString().split("T")[0];var we=wEnd.toISOString().split("T")[0];
    var vol=0;var days=0;
    sessions.forEach(function(s){if(s.date>=ws&&s.date<=we){vol+=s.totalVolume;days++;}});
    weeklyVolume.push({weekLabel:"W-"+wi,volume:vol,days:days});
  }
  weeklyVolume.reverse();
  var todayObj=new Date(getToday()+"T12:00:00");
  var dow=todayObj.getDay();var diffToMon=(dow===0?-6:1-dow);
  var weekMon=new Date(todayObj);weekMon.setDate(todayObj.getDate()+diffToMon);
  var weekMonStr=weekMon.toISOString().split("T")[0];
  var weeklyMuscles={};
  Object.keys(MUSCLE_TARGETS).forEach(function(m){weeklyMuscles[m]=0;});
  Object.keys(byDate).forEach(function(date){
    if(date<weekMonStr)return;
    var rows=byDate[date];var dayOverride=rows[0].day_override;
    var dIdx=(dayOverride!==null&&dayOverride!==undefined)?dayOverride:getDayIdx(date);
    var wo=WORKOUTS[dIdx];if(!wo)return;
    rows.forEach(function(row){
      if(!row.is_done)return;
      var ex=wo.exercises[row.exercise_idx];
      if(!ex||!ex.muscles)return;
      ex.muscles.forEach(function(m){if(weeklyMuscles.hasOwnProperty(m))weeklyMuscles[m]++;});
    });
  });
  return{sessions:sessions,prs:prs,checkHistory:checkHistory.reverse(),currentStreak:currentStreak,longestStreak:longestStreak,weeklyVolume:weeklyVolume,weeklyMuscles:weeklyMuscles};
}

function getGhostFromHistory(sessions,todayDate){
  if(!sessions)return null;
  var todayDayIdx=getDayIdx(todayDate);
  var workout=WORKOUTS[todayDayIdx];if(!workout)return null;
  for(var i=0;i<sessions.length;i++){
    var sess=sessions[i];
    if(sess.date===todayDate)continue;
    if(sess.dayIdx!==todayDayIdx)continue;
    var ghost={date:sess.date,exercises:{}};
    sess.exercises.forEach(function(ex){
      var exIdx=-1;
      for(var j=0;j<workout.exercises.length;j++){if(workout.exercises[j].name===ex.name){exIdx=j;break;}}
      if(exIdx>=0&&ex.sets.length>0){

      }
    });

  }

}

  function doMigration(){
    setMigrating(true);
    var keys=LS.keys();var checkInserts=[];var wlogInserts=[];
    keys.forEach(function(k){
      if(k.indexOf("checks-")===0){
        var date=k.replace("checks-","");var data=LS.get(k);
        if(data)Object.keys(data).forEach(function(taskId){checkInserts.push({user_id:user.id,date:date,task_id:taskId,is_done:!!data[taskId]});});
      }else if(k.match(/^wlog-\d+-\d{4}-/)){
        var parts=k.replace("wlog-","");var di=parts.indexOf("-");
        var dayOv=parseInt(parts.slice(0,di));var date2=parts.slice(di+1);
        var data2=LS.get(k);
        if(data2){
          var processed={};
          Object.keys(data2).forEach(function(key){
            var kparts=key.split("-");if(kparts.length<3)return;
            var ei=parseInt(kparts[0]);var si=parseInt(kparts[1]);var field=kparts[2];
            var rk=ei+"-"+si;
            if(!processed[rk])processed[rk]={user_id:user.id,date:date2,day_override:dayOv,exercise_idx:ei,set_idx:si,is_done:false};
            if(field==="w")processed[rk].weight=parseFloat(data2[key])||null;
            else if(field==="r")processed[rk].reps=parseInt(data2[key])||null;
            else if(field==="done")processed[rk].is_done=!!data2[key];
          });
          Object.keys(processed).forEach(function(rk){wlogInserts.push(processed[rk]);});
        }
      }
    });
    var cycleStartVal=LS.get("cycle-start");
    Promise.all([
      checkInserts.length>0?sb.from("checklist_completions").upsert(checkInserts,{onConflict:"user_id,date,task_id"}):Promise.resolve(),
      wlogInserts.length>0?sb.from("workout_logs").upsert(wlogInserts,{onConflict:"user_id,date,exercise_idx,set_idx"}):Promise.resolve(),
      cycleStartVal?sb.from("profiles").update({cycle_start:cycleStartVal}).eq("id",user.id):Promise.resolve()
    ]).then(function(){
      LS.set("ls-migrated",true);setMigrating(false);setShowMigration(false);
      setHistData(null);loadHistory();
    });
  }

      h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:24,maxWidth:400,width:"100%"}},
        h("div",{style:{fontSize:14,fontWeight:700,color:C.white,marginBottom:4}},
          profile&&profile.anthropic_api_key?"Update API Key":"Anthropic API Key Required"),
        h("div",{style:{fontSize:11,color:C.dim,marginBottom:14,lineHeight:1.6}},
          "Enter your key at console.anthropic.com → API keys. Saves to your account and syncs across all devices."),
        h("div",{style:{position:"relative",marginBottom:apiKeyError?8:14}},
          h("input",{type:apiKeyVisible?"text":"password",placeholder:"sk-ant-...",value:apiKeyInput,
            onChange:function(e){setApiKeyInput(e.target.value);setApiKeyError(null);},
            onKeyDown:function(e){if(e.key==="Enter")saveApiKey();},
            style:Object.assign({},S.input,{width:"100%",padding:"10px",paddingRight:64,fontSize:13})}),
          h("span",{onClick:function(){setApiKeyVisible(function(v){return !v;});},
            style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.dim,fontSize:10,cursor:"pointer",letterSpacing:1,userSelect:"none"}},
            apiKeyVisible?"HIDE":"SHOW")
        ),
        apiKeyError?h("div",{style:{fontSize:11,color:"#ef4444",marginBottom:12,letterSpacing:0.3}},apiKeyError):null,
        h("div",{style:{display:"flex",gap:8}},
          h("div",{onClick:saveApiKey,style:{flex:1,padding:"12px",background:C.green,color:C.bg,fontWeight:700,fontSize:13,textAlign:"center",borderRadius:6,cursor:"pointer"}},"SAVE"),
          h("div",{onClick:function(){setApiKeyModal(false);setApiKeyInput("");setApiKeyError(null);setApiKeyVisible(false);setPendingScan(null);},style:{padding:"12px 16px",border:"1px solid "+C.border,color:C.dim,fontSize:13,textAlign:"center",borderRadius:6,cursor:"pointer"}},"CANCEL")
        )
      )
    ):null,
    h("div",{style:S.nav},
      tabs.map(function(tab){
        return h("div",{key:tab.id,onClick:function(){setView(tab.id);if(tab.id==="workout")setViewDate(getToday());if(tab.id!=="sections")setSection(null);},style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"4px 8px",border:"none",background:"none"}},
          h("span",{style:{fontSize:16}},tab.icon),
          h("span",{style:{fontSize:9,letterSpacing:1,color:view===tab.id?C.accent:C.dim,fontWeight:view===tab.id?700:400}},tab.l)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
