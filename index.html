/* ── APP COMPONENT ── */
function App(){
  const[view,setView]=useState("dashboard");
  const[section,setSection]=useState(null);
  const[openSubs,setOpenSubs]=useState({});
  const d=dayIdx();
  const dt=today();
  const workout=WORKOUTS[d];

  // Checklist state
  const[checks,setChecks]=useState(()=>LS.get(`checks-${dt}`)||{});
  useEffect(()=>{LS.set(`checks-${dt}`,checks)},[checks,dt]);
  const toggleCheck=(id)=>setChecks(p=>({...p,[id]:!p[id]}));
  const checkCount=Object.values(checks).filter(Boolean).length;

  // Workout state
  const[wlog,setWlog]=useState(()=>LS.get(`wlog-${dt}`)||{});
  useEffect(()=>{LS.set(`wlog-${dt}`,wlog)},[wlog,dt]);
  const setWval=(exIdx,setIdx,field,val)=>{
    const k=`${exIdx}-${setIdx}-${field}`;
    setWlog(p=>({...p,[k]:val}));
  };
  const getWval=(exIdx,setIdx,field)=>wlog[`${exIdx}-${setIdx}-${field}`]||"";
  const toggleWdone=(exIdx,setIdx)=>{
    const k=`${exIdx}-${setIdx}-done`;
    setWlog(p=>({...p,[k]:!p[k]}));
  };
  const isWdone=(exIdx,setIdx)=>!!wlog[`${exIdx}-${setIdx}-done`];

  // Deload check
  const weekNum=Math.ceil((new Date()-new Date(new Date().getFullYear(),0,1))/(7*24*60*60*1000));
  const isDeload=weekNum%4===0;

  const toggleSub=(key)=>setOpenSubs(p=>({...p,[key]:!p[key]}));

  /* ── STYLES ── */
  const s={
    wrap:{maxWidth:480,margin:"0 auto",padding:"16px 12px 100px",minHeight:"100vh"},
    header:{padding:"16px 0 12px",borderBottom:`1px solid ${C.border}`,marginBottom:16},
    title:{fontSize:10,letterSpacing:3,color:C.dim,textTransform:"uppercase"},
    h1:{fontSize:20,fontWeight:700,color:C.white,marginTop:4},
    day:{fontSize:12,color:C.accent,marginTop:4},
    card:{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:10},
    label:{fontSize:10,letterSpacing:2,color:C.dim,textTransform:"uppercase",marginBottom:8},
    input:{background:"#0a0a0f",border:`1px solid ${C.border}`,borderRadius:4,color:C.white,padding:"6px 8px",fontSize:13,width:"100%",outline:"none"},
    nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.bg,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0 max(12px, env(safe-area-inset-bottom))",zIndex:100},
    navBtn:(active)=>({display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"4px 16px",border:"none",background:"none"}),
    navIcon:{fontSize:18},
    navLabel:(active)=>({fontSize:9,letterSpacing:1,color:active?C.accent:C.dim,fontWeight:active?700:400}),
  };

  /* ── DASHBOARD VIEW ── */
  const Dashboard=()=>(
    <div className="fade-in">
      <div style={s.header}>
        <div style={s.title}>Personal OS v1.0</div>
        <div style={s.h1}>Today's Execution</div>
        <div style={s.day}>{DAYNAMES[d]} — {workout.name}</div>
        {isDeload&&<div style={{fontSize:11,color:C.orange,marginTop:4}}>⚠️ DELOAD WEEK — 40% less weight, -1 set</div>}
      </div>

      {/* Progress */}
      <div style={{...s.card,display:"flex",alignItems:"center",gap:12}}>
        <div style={{fontSize:28,fontWeight:700,color:checkCount===CHECKLIST.length?C.green:C.accent}}>{checkCount}/{CHECKLIST.length}</div>
        <div>
          <div style={{fontSize:12,color:C.white}}>Tasks Complete</div>
          <div style={{width:160,height:4,background:C.dark,borderRadius:2,marginTop:4}}>
            <div style={{width:`${(checkCount/CHECKLIST.length)*100}%`,height:4,background:checkCount===CHECKLIST.length?C.green:C.accent,borderRadius:2,transition:"width .3s"}}/>
          </div>
        </div>
      </div>

      {/* Checklist */}
      {CHECKLIST.map(item=>(
        <div key={item.id} onClick={()=>toggleCheck(item.id)} style={{...s.card,cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start",opacity:checks[item.id]?0.5:1,borderLeft:`3px solid ${catColor[item.cat]}`,transition:"opacity .2s"}}>
          <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${checks[item.id]?C.green:C.dark}`,background:checks[item.id]?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
            {checks[item.id]&&<span style={{color:C.bg,fontSize:12,fontWeight:700}}>✓</span>}
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:checks[item.id]?C.grey:C.white,textDecoration:checks[item.id]?"line-through":"none"}}>{item.t}</div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>{item.d}</div>
          </div>
        </div>
      ))}
    </div>
  );

  /* ── WORKOUT VIEW ── */
  const Workout=()=>(
    <div className="fade-in">
      <div style={s.header}>
        <div style={s.title}>{DAYNAMES[d]}</div>
        <div style={s.h1}>{workout.name}</div>
        <div style={{fontSize:11,color:C.grey,marginTop:4}}>{workout.focus}</div>
        {isDeload&&<div style={{fontSize:11,color:C.orange,marginTop:4}}>⚠️ DELOAD: -40% weight, -1 set per exercise</div>}
      </div>

      {workout.exercises.map((ex,eIdx)=>{
        const setCount=isDeload?Math.max(1,(ex.sets||3)-1):(ex.sets||3);
        return(
          <div key={eIdx} style={{...s.card}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.white}}>{ex.name}</div>
                <div style={{fontSize:11,color:C.dim,marginTop:2}}>{ex.sets}×{ex.reps} — {ex.note}</div>
              </div>
            </div>
            {Array.from({length:setCount}).map((_,sIdx)=>(
              <div key={sIdx} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:10,color:C.dim,width:24}}>S{sIdx+1}</div>
                <input type="number" placeholder="lbs" value={getWval(eIdx,sIdx,"w")} onChange={e=>setWval(eIdx,sIdx,"w",e.target.value)} style={{...s.input,width:64,textAlign:"center"}}/>
                <input type="number" placeholder="reps" value={getWval(eIdx,sIdx,"r")} onChange={e=>setWval(eIdx,sIdx,"r",e.target.value)} style={{...s.input,width:56,textAlign:"center"}}/>
                <div onClick={()=>toggleWdone(eIdx,sIdx)} style={{width:24,height:24,borderRadius:4,border:`2px solid ${isWdone(eIdx,sIdx)?C.green:C.dark}`,background:isWdone(eIdx,sIdx)?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                  {isWdone(eIdx,sIdx)&&<span style={{color:C.bg,fontSize:11,fontWeight:700}}>✓</span>}
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );

  /* ── SYSTEMS VIEW ── */
  const Systems=()=>(
    <div className="fade-in">
      <div style={s.header}>
        <div style={s.title}>Reference</div>
        <div style={s.h1}>All Systems</div>
      </div>

      {section===null?(
        Object.entries(SECTIONS).map(([key,sec])=>(
          <div key={key} onClick={()=>setSection(key)} style={{...s.card,cursor:"pointer",display:"flex",alignItems:"center",gap:12,borderLeft:`3px solid ${sec.color}`}}>
            <div style={{fontSize:20}}>{sec.icon}</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:C.white}}>{sec.label}</div>
              <div style={{fontSize:11,color:C.dim}}>{sec.subs.length} topics</div>
            </div>
            <div style={{marginLeft:"auto",color:C.dim,fontSize:14}}>→</div>
          </div>
        ))
      ):(
        <div>
          <div onClick={()=>setSection(null)} style={{fontSize:12,color:C.accent,cursor:"pointer",marginBottom:12,display:"flex",alignItems:"center",gap:4}}>
            ← Back to All Systems
          </div>
          <div style={{fontSize:18,fontWeight:700,color:SECTIONS[section].color,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
            <span>{SECTIONS[section].icon}</span>{SECTIONS[section].label}
          </div>
          {SECTIONS[section].subs.map((sub,i)=>{
            const key=`${section}-${i}`;
            const open=openSubs[key];
            return(
              <div key={i} style={{...s.card}}>
                <div onClick={()=>toggleSub(key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.white,letterSpacing:1}}>{sub.t}</div>
                  <div style={{color:C.dim,fontSize:12,transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .15s"}}>▶</div>
                </div>
                {open&&(
                  <div style={{marginTop:10}}>
                    {sub.i.map((item,j)=>(
                      <div key={j} style={{fontSize:12,color:C.grey,lineHeight:1.6,padding:"5px 0 5px 10px",borderLeft:`2px solid ${SECTIONS[section].color}33`,marginBottom:2}}>{item}</div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={s.wrap}>
        {view==="dashboard"&&<Dashboard/>}
        {view==="workout"&&<Workout/>}
        {view==="sections"&&<Systems/>}
      </div>

      {/* Bottom Nav */}
      <div style={s.nav}>
        {[{id:"dashboard",icon:"📋",l:"Today"},{id:"workout",icon:"🏋️",l:"Workout"},{id:"sections",icon:"◆",l:"Systems"}].map(tab=>(
          <div key={tab.id} onClick={()=>{setView(tab.id);if(tab.id!=="sections")setSection(null);}} style={s.navBtn(view===tab.id)}>
            <span style={s.navIcon}>{tab.icon}</span>
            <span style={s.navLabel(view===tab.id)}>{tab.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
