/* HISTORY ENGINE */
function getHistory(){
  var keys=LS.keys();
  var wlogDates=keys.filter(function(k){return k.indexOf("wlog-")===0}).map(function(k){return k.replace("wlog-","")}).sort().reverse();
  var checkDates=keys.filter(function(k){return k.indexOf("checks-")===0}).map(function(k){return k.replace("checks-","")}).sort().reverse();
  var sessions=[];
  wlogDates.forEach(function(date){
    var log=LS.get("wlog-"+date);
    if(!log||Object.keys(log).length===0)return;
    var dIdx=getDayIdx(date);
    var workout=WORKOUTS[dIdx];
    if(!workout)return;
    var exerciseData=[];var totalVolume=0;var setsCompleted=0;
    workout.exercises.forEach(function(ex,eIdx){
      var sets=[];
      for(var sIdx=0;sIdx<(ex.sets||3);sIdx++){
        var w=parseFloat(log[eIdx+"-"+sIdx+"-w"])||0;
        var r=parseFloat(log[eIdx+"-"+sIdx+"-r"])||0;
        var done=!!log[eIdx+"-"+sIdx+"-done"];
        if(w>0||r>0||done){sets.push({set:sIdx+1,weight:w,reps:r,done:done,volume:w*r});totalVolume+=w*r;if(done)setsCompleted++;}
      }
      if(sets.length>0){
        var best=sets.reduce(function(a,b){return a.weight>b.weight?a:b},sets[0]);
        exerciseData.push({name:ex.name,sets:sets,bestWeight:best.weight,bestReps:best.reps});
      }
    });
    if(exerciseData.length>0)sessions.push({date:date,dayName:DAYNAMES[dIdx],workoutName:workout.name,exercises:exerciseData,totalVolume:totalVolume,setsCompleted:setsCompleted});
  });
  var prs={};
  sessions.forEach(function(sess){
    sess.exercises.forEach(function(ex){
      if(!prs[ex.name]||ex.bestWeight>prs[ex.name].weight)prs[ex.name]={weight:ex.bestWeight,reps:ex.bestReps,date:sess.date};
    });
  });
  var checkHistory=[];var currentStreak=0;var longestStreak=0;var tempStreak=0;
  var sorted=checkDates.slice().sort();
  sorted.forEach(function(date){
    var checks=LS.get("checks-"+date);
    if(!checks)return;
    var completed=Object.values(checks).filter(Boolean).length;
    var pct=Math.round((completed/CHECKLIST.length)*100);
    checkHistory.push({date:date,completed:completed,total:CHECKLIST.length,pct:pct});
    if(pct>=75){tempStreak++;if(tempStreak>longestStreak)longestStreak=tempStreak;}else tempStreak=0;
  });
  currentStreak=tempStreak;
  var weeklyVolume=[];var now=new Date();
  for(var w=0;w<8;w++){
    var wEnd=new Date(now);wEnd.setDate(now.getDate()-w*7);
    var wStart=new Date(wEnd);wStart.setDate(wEnd.getDate()-6);
    var ws=wStart.toISOString().split("T")[0];var we=wEnd.toISOString().split("T")[0];
    var vol=0;var days=0;
    sessions.forEach(function(s){if(s.date>=ws&&s.date<=we){vol+=s.totalVolume;days++;}});
    weeklyVolume.push({weekLabel:"W-"+w,volume:vol,days:days});
  }
  weeklyVolume.reverse();
  return{sessions:sessions,prs:prs,checkHistory:checkHistory.reverse(),currentStreak:currentStreak,longestStreak:longestStreak,weeklyVolume:weeklyVolume};
}

/* BAR CHART */
function BarChart(props){
  var data=props.data;var labelKey=props.labelKey;var valueKey=props.valueKey;var color=props.color;var ht=props.height||120;
  var max=Math.max.apply(null,data.map(function(d){return d[valueKey]}));
  if(max===0)max=1;
  return h("div",{style:{display:"flex",alignItems:"flex-end",gap:4,height:ht,padding:"0 4px"}},
    data.map(function(d,i){
      var pct=(d[valueKey]/max)*100;
      return h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
        h("div",{style:{fontSize:9,color:C.dim}},d[valueKey]>0?(d[valueKey]>=1000?Math.round(d[valueKey]/1000)+"k":d[valueKey]):""),
        h("div",{style:{width:"100%",background:color+"22",borderRadius:3,position:"relative",height:ht-30}},
          h("div",{style:{position:"absolute",bottom:0,left:0,right:0,height:pct+"%",background:color,borderRadius:3,transition:"height .5s ease"}})
        ),
        h("div",{style:{fontSize:8,color:C.dim}},d[labelKey])
      );
    })
  );
}

      CHECKLIST.map(function(item){
        return h("div",{key:item.id,onClick:function(){toggleCheck(item.id)},style:Object.assign({},S.card,{cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start",opacity:checks[item.id]?0.5:1,borderLeft:"3px solid "+catColor[item.cat],transition:"opacity .2s"})},
          h(Checkbox,{checked:!!checks[item.id]}),
          h("div",null,
            h("div",{style:{fontSize:12,fontWeight:600,color:checks[item.id]?C.grey:C.white,textDecoration:checks[item.id]?"line-through":"none"}},item.t),
            h("div",{style:{fontSize:11,color:C.dim,marginTop:2}},item.d)
          )
        );
      })
    );
  }

  /* ── WORKOUT ── */
  function WorkoutView(){
    return h("div",{className:"fade-in"},
      h("div",{style:S.header},
        h("div",{style:S.title},DAYNAMES[d]),
        h("div",{style:S.h1},workout.name),
        h("div",{style:{fontSize:11,color:C.grey,marginTop:4}},workout.focus),
        h("div",{style:{fontSize:11,color:isDeload?C.orange:C.dim,marginTop:4}},isDeload?"\u26A0\uFE0F DELOAD: -40% weight, -1 set":"Week "+cycleWeek+" of 4")
      ),
      workout.exercises.map(function(ex,eIdx){
        var setCount=isDeload?Math.max(1,(ex.sets||3)-1):(ex.sets||3);
        var pr=history&&history.prs[ex.name];
        return h("div",{key:eIdx,style:S.card},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:13,fontWeight:600,color:C.white}},ex.name),
              h("div",{style:{fontSize:11,color:C.dim,marginTop:2}},ex.sets+"x"+ex.reps+" \u2014 "+ex.note)
            ),
            pr&&pr.weight>0?h("div",{style:{background:C.accent+"15",border:"1px solid "+C.accent+"33",borderRadius:6,padding:"4px 8px",textAlign:"center",flexShrink:0,marginLeft:8}},
              h("div",{style:{fontSize:11,fontWeight:700,color:C.accent}},"PR "+pr.weight+"lb"),
              h("div",{style:{fontSize:9,color:C.dim}},"x"+pr.reps)
            ):null
          ),
          Array.from({length:setCount}).map(function(_,sIdx){
            return h("div",{key:eIdx+"-"+sIdx,style:{display:"flex",gap:8,alignItems:"center",marginBottom:6}},
              h("div",{style:{fontSize:10,color:C.dim,width:24}},"S"+(sIdx+1)),
              h("input",{type:"number",inputMode:"numeric",pattern:"[0-9]*",placeholder:"lbs",defaultValue:getWval(eIdx,sIdx,"w"),onBlur:function(e){setWval(eIdx,sIdx,"w",e.target.value)},style:Object.assign({},S.input,{width:64,textAlign:"center"})}),
              h("input",{type:"number",inputMode:"numeric",pattern:"[0-9]*",placeholder:"reps",defaultValue:getWval(eIdx,sIdx,"r"),onBlur:function(e){setWval(eIdx,sIdx,"r",e.target.value)},style:Object.assign({},S.input,{width:56,textAlign:"center"})}),
              h("div",{onClick:function(){toggleWdone(eIdx,sIdx)},style:{width:24,height:24,borderRadius:4,border:"2px solid "+(isWdone(eIdx,sIdx)?C.green:C.dark),background:isWdone(eIdx,sIdx)?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}},
                isWdone(eIdx,sIdx)?h("span",{style:{color:C.bg,fontSize:11,fontWeight:700}},"\u2713"):null
              )
            );
          })
        );
      })
    );
  }

  /* ── HISTORY ── */
  function HistoryView(){
    if(!history)return null;
    var sessions=history.sessions;var prs=history.prs;var checkHistory=history.checkHistory;
    var currentStreak=history.currentStreak;var longestStreak=history.longestStreak;var weeklyVolume=history.weeklyVolume;
    var prList=Object.entries(prs).filter(function(e){return e[1].weight>0}).sort(function(a,b){return b[1].weight-a[1].weight});

    function pill(active){return{padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:active?700:400,color:active?C.bg:C.grey,background:active?C.accent:"transparent",border:"1px solid "+(active?C.accent:C.border),cursor:"pointer",letterSpacing:1}}

    return h("div",{className:"fade-in"},
      h("div",{style:S.header},
        h("div",{style:S.title},"History"),
        h("div",{style:S.h1},"Progress Tracker")
      ),
      h("div",{style:{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}},
        [{id:"workouts",l:"Workouts"},{id:"prs",l:"PRs"},{id:"streaks",l:"Streaks"},{id:"volume",l:"Volume"}].map(function(t){
          return h("div",{key:t.id,onClick:function(){setHistoryTab(t.id)},style:pill(historyTab===t.id)},t.l);
        })
      ),

      /* WORKOUTS */
      historyTab==="workouts"?h("div",null,
        sessions.length===0?h("div",{style:Object.assign({},S.card,{textAlign:"center",color:C.dim,padding:32})},
          h("div",{style:{fontSize:24,marginBottom:8}},"\uD83C\uDFCB\uFE0F"),
          h("div",{style:{fontSize:13}},"No workout data yet"),
          h("div",{style:{fontSize:11,marginTop:4}},"Log a workout and it shows here")
        ):sessions.slice(0,20).map(function(sess,i){
          var isOpen=expandedSession===i;
          return h("div",{key:i,style:Object.assign({},S.card,{borderLeft:"3px solid "+C.blue})},
            h("div",{onClick:function(){setExpandedSession(isOpen?null:i)},style:{cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("div",null,
                h("div",{style:{fontSize:12,fontWeight:600,color:C.white}},fmtDate(sess.date)),
                h("div",{style:{fontSize:11,color:C.dim,marginTop:2}},sess.workoutName)
              ),
              h("div",{style:{textAlign:"right"}},
                h("div",{style:{fontSize:12,fontWeight:600,color:C.accent}},(sess.totalVolume>=1000?(sess.totalVolume/1000).toFixed(1)+"k":sess.totalVolume)+" lbs"),
                h("div",{style:{fontSize:10,color:C.dim}},sess.setsCompleted+" sets")
              )
            ),
            isOpen?h("div",{style:{marginTop:12,borderTop:"1px solid "+C.border,paddingTop:10}},
              sess.exercises.map(function(ex,j){
                return h("div",{key:j,style:{marginBottom:10}},
                  h("div",{style:{fontSize:11,fontWeight:600,color:C.white,marginBottom:4}},ex.name),
                  ex.sets.map(function(st,k){
                    return h("div",{key:k,style:{display:"flex",gap:12,fontSize:11,color:C.grey,paddingLeft:8}},
                      h("span",{style:{color:C.dim,width:20}},"S"+st.set),
                      h("span",null,st.weight+"lb"),
                      h("span",null,"x"+st.reps),
                      h("span",{style:{color:C.dim}},"= "+st.volume+"lb")
                    );
                  })
                );
              })
            ):null
          );
        })
      ):null,

      /* PRs */
      historyTab==="prs"?h("div",null,
        prList.length===0?h("div",{style:Object.assign({},S.card,{textAlign:"center",color:C.dim,padding:32})},
          h("div",{style:{fontSize:24,marginBottom:8}},"\uD83C\uDFC6"),
          h("div",{style:{fontSize:13}},"No PRs yet"),
          h("div",{style:{fontSize:11,marginTop:4}},"Heaviest set per exercise appears here")
        ):prList.map(function(entry,i){
          var name=entry[0];var pr=entry[1];
          return h("div",{key:i,style:Object.assign({},S.card,{display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+C.accent})},
            h("div",null,
              h("div",{style:{fontSize:12,fontWeight:600,color:C.white}},name),
              h("div",{style:{fontSize:10,color:C.dim,marginTop:2}},fmtDate(pr.date))
            ),
            h("div",{style:{textAlign:"right"}},
              h("div",{style:{fontSize:18,fontWeight:700,color:C.accent}},pr.weight,h("span",{style:{fontSize:11,color:C.dim}},"lb")),
              h("div",{style:{fontSize:10,color:C.dim}},"x"+pr.reps)
            )
          );
        })
      ):null,

      /* STREAKS */
      historyTab==="streaks"?h("div",null,
        h("div",{style:{display:"flex",gap:10,marginBottom:16}},
          h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px",flex:1,textAlign:"center"}},
            h("div",{style:{fontSize:22,fontWeight:700,color:C.green}},currentStreak),
            h("div",{style:{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}},"CURRENT")
          ),
          h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px",flex:1,textAlign:"center"}},
            h("div",{style:{fontSize:22,fontWeight:700,color:C.accent}},longestStreak),
            h("div",{style:{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}},"LONGEST")
          ),
          h("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px",flex:1,textAlign:"center"}},
            h("div",{style:{fontSize:22,fontWeight:700,color:C.blue}},checkHistory.length),
            h("div",{style:{fontSize:9,color:C.dim,letterSpacing:1,marginTop:2}},"DAYS")
          )
        ),
        h("div",{style:{fontSize:10,color:C.dim,letterSpacing:1,marginBottom:8}},"STREAK = 75%+ TASKS COMPLETED"),
        checkHistory.length===0?h("div",{style:Object.assign({},S.card,{textAlign:"center",color:C.dim,padding:32})},
          h("div",{style:{fontSize:24,marginBottom:8}},"\uD83D\uDCCB"),
          h("div",{style:{fontSize:13}},"No checklist data yet")
        ):checkHistory.slice(0,14).map(function(ch,i){
          var clr=ch.pct>=75?C.green:ch.pct>=50?C.yellow:C.red;
          return h("div",{key:i,style:Object.assign({},S.card,{display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+clr})},
            h("div",null,
              h("div",{style:{fontSize:12,fontWeight:600,color:C.white}},fmtDate(ch.date)),
              h("div",{style:{fontSize:11,color:C.dim,marginTop:2}},ch.completed+"/"+ch.total+" tasks")
            ),
            h("div",{style:{fontSize:18,fontWeight:700,color:clr}},ch.pct+"%")
          );
        })
      ):null,

      /* VOLUME */
      historyTab==="volume"?h("div",null,
        h("div",{style:S.card},
          h("div",{style:{fontSize:11,fontWeight:600,color:C.white,marginBottom:12,letterSpacing:1}},"WEEKLY TOTAL VOLUME (lbs)"),
          weeklyVolume.some(function(w){return w.volume>0})?h(BarChart,{data:weeklyVolume,labelKey:"weekLabel",valueKey:"volume",color:C.blue})
          :h("div",{style:{textAlign:"center",color:C.dim,padding:24,fontSize:12}},"Log workouts to see volume trend")
        ),
        h("div",{style:S.card},
          h("div",{style:{fontSize:11,fontWeight:600,color:C.white,marginBottom:12,letterSpacing:1}},"TRAINING DAYS PER WEEK"),
          weeklyVolume.some(function(w){return w.days>0})?h(BarChart,{data:weeklyVolume,labelKey:"weekLabel",valueKey:"days",color:C.green,height:80})
          :h("div",{style:{textAlign:"center",color:C.dim,padding:24,fontSize:12}},"Log workouts to see consistency")
        )
      ):null
    );
  }

  /* ── SYSTEMS ── */
  function SystemsView(){
    return h("div",{className:"fade-in"},
      h("div",{style:S.header},
        h("div",{style:S.title},"Reference"),
        h("div",{style:S.h1},"All Systems")
      ),
      section===null?Object.entries(SECTIONS).map(function(entry){
        var key=entry[0];var sec=entry[1];
        return h("div",{key:key,onClick:function(){setSection(key)},style:Object.assign({},S.card,{cursor:"pointer",display:"flex",alignItems:"center",gap:12,borderLeft:"3px solid "+sec.color})},
          h("div",{style:{fontSize:20}},sec.icon),
          h("div",null,
            h("div",{style:{fontSize:13,fontWeight:600,color:C.white}},sec.label),
            h("div",{style:{fontSize:11,color:C.dim}},sec.subs.length+" topics")
          ),
          h("div",{style:{marginLeft:"auto",color:C.dim,fontSize:14}},"\u2192")
        );
      }):h("div",null,
        h("div",{onClick:function(){setSection(null)},style:{fontSize:12,color:C.accent,cursor:"pointer",marginBottom:12}},"\u2190 Back"),
        h("div",{style:{fontSize:18,fontWeight:700,color:SECTIONS[section].color,marginBottom:16,display:"flex",alignItems:"center",gap:8}},
          h("span",null,SECTIONS[section].icon),SECTIONS[section].label
        ),
        SECTIONS[section].subs.map(function(sub,i){
          var key=section+"-"+i;var open=openSubs[key];
          return h("div",{key:i,style:S.card},
            h("div",{onClick:function(){toggleSub(key)},style:{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}},
              h("div",{style:{fontSize:12,fontWeight:600,color:C.white,letterSpacing:1}},sub.t),
              h("div",{style:{color:C.dim,fontSize:12,transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .15s"}},"\u25B6")
            ),
            open?h("div",{style:{marginTop:10}},
              sub.i.map(function(item,j){
                return h("div",{key:j,style:{fontSize:12,color:C.grey,lineHeight:1.6,padding:"5px 0 5px 10px",borderLeft:"2px solid "+SECTIONS[section].color+"33",marginBottom:2}},item);
              })
            ):null
          );
        })
      )
    );
  }

  /* ── RENDER ── */
  var tabs=[{id:"dashboard",icon:"\uD83D\uDCCB",l:"Today"},{id:"workout",icon:"\uD83C\uDFCB\uFE0F",l:"Workout"},{id:"history",icon:"\uD83D\uDCCA",l:"History"},{id:"sections",icon:"\u25C6",l:"Systems"}];

  return h("div",{style:{background:C.bg,minHeight:"100vh"}},
    h("div",{style:S.wrap},
      view==="dashboard"?h(Dashboard):null,
      view==="workout"?h(WorkoutView):null,
      view==="history"?h(HistoryView):null,
      view==="sections"?h(SystemsView):null
    ),
    h("div",{style:S.nav},
      tabs.map(function(tab){
        return h("div",{key:tab.id,onClick:function(){setView(tab.id);if(tab.id!=="sections")setSection(null)},style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"4px 12px",border:"none",background:"none"}},
          h("span",{style:{fontSize:18}},tab.icon),
          h("span",{style:{fontSize:9,letterSpacing:1,color:view===tab.id?C.accent:C.dim,fontWeight:view===tab.id?700:400}},tab.l)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
